  <meta charset="utf-8">

  <meta name="description" content="En personlig, kureret rejseguide til 6 dage i New York City. April 2026.">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <app-root></app-root>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        var hadController = !!navigator.serviceWorker.controller;
        var lastCheck = 0;
        navigator.serviceWorker.register('/sw.js').then(function (reg) {
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible' && Date.now() - lastCheck > 60000) {
              lastCheck = Date.now();
              reg.update();
            }
          });
        });
        if (hadController) {
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            document.dispatchEvent(new CustomEvent('sw-updated'));
          });
        }
      });
    }
  </script>
</body>
</html>
