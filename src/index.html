<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <title>Rejseguide — Travel Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="En personlig, kureret rejseguide til dine rejser.">
  <meta name="theme-color" content="#3d4f6f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Rejseguide">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.mapbox.com">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        var hadController = !!navigator.serviceWorker.controller;
        var lastCheck = 0;
        navigator.serviceWorker.register('/sw.js').then(function (reg) {
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible' && Date.now() - lastCheck > 60000) {
              lastCheck = Date.now();
              reg.update();
            }
          });
        });
        if (hadController) {
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            document.dispatchEvent(new CustomEvent('sw-updated'));
          });
        }
      });
    }
  </script>
</body>
</html>
