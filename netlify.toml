[build]
  command = "node -e \"require('fs').writeFileSync('src/environments/environment.ts','export const environment = {\\n  mapboxToken: \\''+(process.env.MAPBOX_TOKEN||'')+'\\',\\n  vapidPublicKey: \\''+(process.env.VAPID_PUBLIC_KEY||'')+'\\',\\n};\\n');console.log('Wrote environment.ts from env vars')\" && npm run build"
  publish = "dist/travel-guide/browser"

[dev]
  command = "npm start"
  framework = "#custom"
  targetPort = 4200
  port = 8888
  autoLaunch = false

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--no-optional"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/javascript"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

## SPA fallback redirect is in public/_redirects so it only applies in
## production builds, not during `netlify dev` (which proxies to Angular's
## dev server that already handles SPA routing).
