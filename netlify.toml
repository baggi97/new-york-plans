[build]
  command = "node -e \"const f='src/environments/environment.ts';let c=require('fs').readFileSync(f,'utf8');c=c.replace('MAPBOX_TOKEN_PLACEHOLDER',process.env.MAPBOX_TOKEN||'');c=c.replace('VAPID_PUBLIC_KEY_PLACEHOLDER',process.env.VAPID_PUBLIC_KEY||'');require('fs').writeFileSync(f,c)\" && npm run build"
  publish = "dist/nyc-magazine/browser"

[dev]
  command = "npm start"
  framework = "#custom"
  targetPort = 4200
  port = 8888
  autoLaunch = false

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--no-optional"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/javascript"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

## SPA fallback redirect is in public/_redirects so it only applies in
## production builds, not during `netlify dev` (which proxies to Angular's
## dev server that already handles SPA routing).
