[build]
  command = "npm run build"
  publish = "dist/nyc-magazine/browser"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--no-optional"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/javascript"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
